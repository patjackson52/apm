<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; background:var(--bg-surface); color:var(--fg); font-family:var(--font-sans); padding:22px 26px; }
  .row { display:flex; align-items:baseline; gap:16px; margin-bottom:10px; }
  .tag { font-family:var(--font-mono); font-size:11px; color:var(--fg-subtle); width:96px; flex:0 0 auto; }
  .d1 { font-size:40px; font-weight:600; letter-spacing:-0.02em; }
  .d2 { font-size:30px; font-weight:600; letter-spacing:-0.02em; }
  .d3 { font-size:24px; font-weight:600; letter-spacing:-0.015em; }
  .d4 { font-size:20px; font-weight:600; }
</style></head>
<body class="apm-root">
  <div class="row"><span class="tag">40 / 600</span><span class="d1">Workflow engine</span></div>
  <div class="row"><span class="tag">30 / 600</span><span class="d2">Feature delivery run</span></div>
  <div class="row"><span class="tag">24 / 600</span><span class="d3">Awaiting human decision</span></div>
  <div class="row"><span class="tag">20 / 600</span><span class="d4">Dependencies &amp; blockers</span></div>
</body></html>
