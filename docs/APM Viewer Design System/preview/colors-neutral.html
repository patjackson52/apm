<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; background:var(--bg-surface); font-family:var(--font-sans); padding:20px 24px; }
  .grid { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; }
  .sw { display:flex; flex-direction:column; gap:5px; }
  .chip { height:42px; border-radius:7px; border:1px solid var(--border); }
  .nm { font-size:10.5px; font-weight:600; color:var(--fg); }
  .hx { font-family:var(--font-mono); font-size:9.5px; color:var(--fg-subtle); }
  h4 { font-size:11px; letter-spacing:.04em; text-transform:uppercase; color:var(--fg-subtle); margin:0 0 12px; }
</style></head>
<body class="apm-root">
  <h4>Neutral surfaces · borders · text (light)</h4>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--bg-app)"></div><div class="nm">app</div><div class="hx">#f6f7f9</div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-surface)"></div><div class="nm">surface</div><div class="hx">#ffffff</div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-subtle)"></div><div class="nm">subtle</div><div class="hx">#f1f2f5</div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-muted)"></div><div class="nm">muted</div><div class="hx">#e9ebef</div></div>
    <div class="sw"><div class="chip" style="background:var(--border)"></div><div class="nm">border</div><div class="hx">#e4e6eb</div></div>
    <div class="sw"><div class="chip" style="background:var(--border-strong)"></div><div class="nm">border+</div><div class="hx">#d2d6de</div></div>
    <div class="sw"><div class="chip" style="background:var(--fg)"></div><div class="nm" style="color:var(--fg)">fg</div><div class="hx">#181b22</div></div>
    <div class="sw"><div class="chip" style="background:var(--fg-muted)"></div><div class="nm">fg-muted</div><div class="hx">#5a616e</div></div>
    <div class="sw"><div class="chip" style="background:var(--fg-subtle)"></div><div class="nm">fg-subtle</div><div class="hx">#878d9a</div></div>
    <div class="sw"><div class="chip" style="background:var(--fg-faint)"></div><div class="nm">fg-faint</div><div class="hx">#aab0bb</div></div>
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="nm">accent</div><div class="hx">#3b66f5</div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-bg);border-color:var(--accent-border)"></div><div class="nm">accent-bg</div><div class="hx">#eef2fe</div></div>
  </div>
</body></html>
