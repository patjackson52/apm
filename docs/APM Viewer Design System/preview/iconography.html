<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
<style> body { margin:0; background:var(--bg-surface); font-family:var(--font-sans); padding:20px 24px; }
  h4 { font-size:11px; letter-spacing:.04em; text-transform:uppercase; color:var(--fg-subtle); margin:0 0 14px; }
  .grid { display:grid; grid-template-columns:repeat(12,1fr); gap:14px; }
  .ic { display:flex; align-items:center; justify-content:center; color:var(--fg-muted); }
  svg { width:19px; height:19px; }
</style></head>
<body class="apm-root">
  <h4>Lucide · 1.75 stroke · the icon system</h4>
  <div class="grid">
    <span class="ic"><i data-lucide="layout-dashboard"></i></span><span class="ic"><i data-lucide="list-tree"></i></span>
    <span class="ic"><i data-lucide="file-text"></i></span><span class="ic"><i data-lucide="map"></i></span>
    <span class="ic"><i data-lucide="scale"></i></span><span class="ic"><i data-lucide="workflow"></i></span>
    <span class="ic"><i data-lucide="octagon-alert"></i></span><span class="ic"><i data-lucide="bot"></i></span>
    <span class="ic"><i data-lucide="users"></i></span><span class="ic"><i data-lucide="user-round-check"></i></span>
    <span class="ic"><i data-lucide="git-fork"></i></span><span class="ic"><i data-lucide="git-merge"></i></span>
    <span class="ic"><i data-lucide="key-round"></i></span><span class="ic"><i data-lucide="copy"></i></span>
    <span class="ic"><i data-lucide="clipboard-copy"></i></span><span class="ic"><i data-lucide="check"></i></span>
    <span class="ic"><i data-lucide="search"></i></span><span class="ic"><i data-lucide="chevron-down"></i></span>
    <span class="ic"><i data-lucide="circle-check-big"></i></span><span class="ic"><i data-lucide="target"></i></span>
    <span class="ic"><i data-lucide="sparkles"></i></span><span class="ic"><i data-lucide="bug"></i></span>
    <span class="ic"><i data-lucide="flask-conical"></i></span><span class="ic"><i data-lucide="moon"></i></span>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
