<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style> body { margin:0; font-family:var(--font-sans); display:grid; grid-template-columns:1fr 1fr; }
  .pane { padding:24px 28px; display:flex; align-items:center; gap:14px; }
  .light { background:#fff; } .dark { background:#0c0e12; }
  .mark svg { color:#3b66f5; } .dark .mark svg { color:#5a7dff; }
  .nm { font-weight:600; font-size:18px; letter-spacing:-0.01em; }
  .light .nm { color:#181b22; } .dark .nm { color:#e8eaee; }
  .nm small { font-weight:400; } .light .nm small { color:#878d9a; } .dark .nm small { color:#6c747f; }
</style></head>
<body>
  <div class="pane light">
    <span class="mark"><svg width="34" height="34" viewBox="0 0 32 32" fill="none"><rect x="0.5" y="0.5" width="31" height="31" rx="8" fill="currentColor" fill-opacity="0.10" stroke="currentColor" stroke-opacity="0.22"/><g stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M9 16 H13" stroke-opacity="0.55"/><path d="M18.5 11.5 L15.5 14.5" stroke-opacity="0.55"/><path d="M18.5 20.5 L15.5 17.5" stroke-opacity="0.55"/></g><circle cx="8" cy="16" r="2.6" fill="currentColor"/><circle cx="14.5" cy="16" r="2.2" fill="currentColor" fill-opacity="0.85"/><rect x="19" y="8.6" width="5.4" height="5.4" rx="1.6" fill="currentColor" fill-opacity="0.7"/><rect x="19" y="18" width="5.4" height="5.4" rx="2.7" fill="currentColor"/></svg></span>
    <span class="nm">APM Viewer <small>· api-ui</small></span>
  </div>
  <div class="pane dark">
    <span class="mark"><svg width="34" height="34" viewBox="0 0 32 32" fill="none"><rect x="0.5" y="0.5" width="31" height="31" rx="8" fill="currentColor" fill-opacity="0.10" stroke="currentColor" stroke-opacity="0.22"/><g stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M9 16 H13" stroke-opacity="0.55"/><path d="M18.5 11.5 L15.5 14.5" stroke-opacity="0.55"/><path d="M18.5 20.5 L15.5 17.5" stroke-opacity="0.55"/></g><circle cx="8" cy="16" r="2.6" fill="currentColor"/><circle cx="14.5" cy="16" r="2.2" fill="currentColor" fill-opacity="0.85"/><rect x="19" y="8.6" width="5.4" height="5.4" rx="1.6" fill="currentColor" fill-opacity="0.7"/><rect x="19" y="18" width="5.4" height="5.4" rx="2.7" fill="currentColor"/></svg></span>
    <span class="nm">APM Viewer <small>· api-ui</small></span>
  </div>
</body></html>
