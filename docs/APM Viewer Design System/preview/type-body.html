<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; background:var(--bg-surface); color:var(--fg); font-family:var(--font-sans); padding:22px 26px; }
  .row { display:flex; align-items:baseline; gap:16px; margin-bottom:9px; }
  .tag { font-family:var(--font-mono); font-size:11px; color:var(--fg-subtle); width:120px; flex:0 0 auto; }
  .prose { font-size:15px; line-height:1.6; color:var(--fg); max-width:440px; }
  .b { font-size:14px; } .s { font-size:13px; color:var(--fg-muted); } .xs { font-size:12px; color:var(--fg-subtle); }
</style></head>
<body class="apm-root">
  <div class="row"><span class="tag">prose · 15/1.7</span><span class="prose">The engine persists each transition to an append-only log.</span></div>
  <div class="row"><span class="tag">body · 14</span><span class="b">Default UI text and table body</span></div>
  <div class="row"><span class="tag">small · 13</span><span class="s">Secondary labels and metadata</span></div>
  <div class="row"><span class="tag">caption · 12</span><span class="xs">Captions, timestamps, helper text</span></div>
  <div class="row"><span class="tag">eyebrow · 11</span><span class="eyebrow">SECTION LABEL</span></div>
