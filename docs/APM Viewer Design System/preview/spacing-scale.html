<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; background:var(--bg-surface); font-family:var(--font-sans); padding:20px 24px; }
  .row { display:flex; align-items:center; gap:14px; margin-bottom:7px; }
  .k { font-family:var(--font-mono); font-size:11px; color:var(--fg-subtle); width:90px; }
  .bar { height:14px; background:var(--accent); border-radius:3px; opacity:.85; }
  h4 { font-size:11px; letter-spacing:.04em; text-transform:uppercase; color:var(--fg-subtle); margin:0 0 14px; }
</style></head>
<body class="apm-root">
  <h4>Spacing scale · 4px base</h4>
  <div class="row"><span class="k">1 · 4px</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="k">2 · 8px</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="k">3 · 12px</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="k">4 · 16px</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="k">6 · 24px</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="k">8 · 32px</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="k">12 · 48px</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="k">16 · 64px</span><span class="bar" style="width:64px"></span></div>
</body></html>
